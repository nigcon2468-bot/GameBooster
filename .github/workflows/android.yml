name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Minimal Build Files
      run: |
        echo "plugins { id 'com.android.application' version '8.1.1' }" > build.gradle
        echo "rootProject.name = 'GameBooster'" > settings.gradle

    - name: Run Build
      run: |
        echo "Building App Layout..."
        
