name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android Project Structure
      run: |
        mkdir -p app/src/main/java/com/gamebooster/overlay
        mkdir -p app/src/main/res/values
        
        # Move files to official Android layout positions
        mv AndroidManifest.xml app/src/main/
        mv com/gamebooster/overlay/*.java app/src/main/java/com/gamebooster/overlay/
        
        # Create standard build configs
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } } dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } } rootProject.name = 'GameBooster'" > settings.gradle
        echo "plugins { id 'com.android.application' version '8.1.1' } android { compileSdk 34; defaultConfig { applicationId 'com.gamebooster.overlay'; minSdk 26; targetSdk 34; versionCode 1; versionName '1.0' } } dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle
        echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">GameBooster</string></resources>' > app/src/main/res/values/strings.xml

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: GameBooster-App
        path: app/build/outputs/apk/debug/*.apk
        
